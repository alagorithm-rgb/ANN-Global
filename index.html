<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANN Feed Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Libre+Franklin:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Libre+Franklin', sans-serif; background-color: #f4f1ea; color: #1a1a1a; }
        .serif { font-family: 'Playfair Display', serif; }
        .newspaper-border { border: 1px solid #2a2a2a; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto border-double border-4 border-black p-4 md:p-6 bg-white shadow-2xl">
        <header class="text-center border-b-2 border-black pb-4 mb-6">
            <div class="flex justify-between items-end text-xs font-bold uppercase tracking-widest mb-4">
                <div id="live-date">SATURDAY · APRIL 11, 2026</div>
                <div class="text-xl serif italic">ANN Feed</div>
                <div>VOL. II · NO. 101</div>
            </div>
            <h1 class="text-6xl md:text-8xl serif font-black tracking-tighter uppercase mb-2">ANN News Intelligence</h1>
            <p class="text-sm font-semibold tracking-[0.2em] border-t border-b border-black py-2 inline-block px-8 uppercase">
                Global Context · Human Prompted · AI Synthesized
            </p>
        </header>

        <div class="bg-black text-white p-4 flex flex-col md:flex-row justify-between items-center mb-8">
            <p class="serif italic mb-2 md:mb-0">Join 12,000+ subscribers for the daily intelligence brief.</p>
            <div class="flex gap-2">
                <input type="email" placeholder="Enter Email" class="px-4 py-1 text-black text-sm">
                <button onclick="window.location.href='https://annfeed.beehiiv.com/subscribe'" class="bg-white text-black px-6 py-1 font-bold text-sm hover:bg-gray-200 uppercase">Subscribe Free</button>
            </div>
        </div>

        <div id="news-container" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="col-span-3 text-center py-20 italic serif text-gray-400">
                Fetching latest intelligence from the grid...
            </div>
        </div>
    </div>

    <script>
        async function loadNews() {
            const container = document.getElementById('news-container');
            try {
                // CACHE BUSTER: This 't=' forces the browser to ignore old memory
                const response = await fetch('news.json?t=' + Date.now());
                const data = await response.json();
                
                container.innerHTML = ''; // Clear placeholders

                data.articles.forEach((article, index) => {
                    const articleEl = document.createElement('div');
                    // Give the first article a larger look (Headline spot)
                    const isFeature = index === 0;
                    articleEl.className = isFeature ? "col-span-1 md:col-span-2 border-r-0 md:border-r border-black pr-0 md:pr-8 mb-6" : "mb-6";
                    
                    articleEl.innerHTML = `
                        <div class="mb-2 uppercase text-xs font-black tracking-tighter text-red-700">
                            ${article.category || 'Global'} / ${article.source}
                        </div>
                        <h2 class="${isFeature ? 'text-4xl' : 'text-xl'} serif font-bold mb-3 hover:underline cursor-pointer leading-tight">
                            <a href="${article.url}" target="_blank">${article.title}</a>
                        </h2>
                        <p class="text-sm leading-relaxed text-gray-700 mb-4 line-clamp-3">
                            ${article.brief}
                        </p>
                        <div class="flex justify-between items-center text-[10px] font-bold border-t border-gray-200 pt-2 uppercase">
                            <span>${article.time || 'JUST IN'}</span>
                            <a href="${article.url}" target="_blank" class="hover:text-red-700">Read Brief →</a>
                        </div>
                    `;
                    container.appendChild(articleEl);
                });
            } catch (error) {
                container.innerHTML = `<div class="col-span-3 text-center text-red-600">Sync Error: Unable to fetch news.json. Check GitHub Actions.</div>`;
            }
        }
        loadNews();
    </script>
</body>
</html>
